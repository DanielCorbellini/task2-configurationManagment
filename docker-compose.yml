services:
  # --------------- Banco de Dados PostgreSQL ---------------
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lancamentos}
    ports:
      - "5432:5432"
    volumes:
      # Persiste os dados do banco entre recriações do contêiner
      - pgdata:/var/lib/postgresql/data
      # Executa o dump.sql automaticamente na PRIMEIRA inicialização
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lancamentos}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------- Aplicação Flask ---------------
  app:
    build: .
    container_name: app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Sobrescreve o DB_HOST para apontar ao serviço "db" do Compose
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
